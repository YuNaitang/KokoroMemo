server:
  host: "127.0.0.1"
  port: 14514
  webui_port: 14515
  log_level: "INFO"
  allow_remote_access: false
  admin_token: ""
  admin_token_env: "ADMIN_TOKEN"
  timezone: ""  # IANA 时区名，如 "Asia/Shanghai"、"America/New_York"；留空使用系统本地时间

llm:
  # 支持: openai_compatible | openai_responses | anthropic | gemini
  provider: "openai_compatible"
  base_url: "https://api.example.com/v1"
  api_key: ""
  api_key_env: "LLM_API_KEY"
  model: "your-chat-model"
  timeout_seconds: 120

  # provider 说明:
  # openai_compatible: 标准 OpenAI Chat Completions（也适用于 DeepSeek、Grok、中转站等）
  #   base_url 示例: https://api.openai.com/v1 或 https://api.deepseek.com/v1
  # openai_responses: OpenAI Responses API
  #   base_url 示例: https://api.openai.com/v1
  # anthropic: Anthropic Claude Messages API
  #   base_url 示例: https://api.anthropic.com/v1
  # gemini: Google Gemini API
  #   base_url 示例: https://generativelanguage.googleapis.com/v1beta

embedding:
  enabled: true
  provider: "modelark"
  base_url: ""
  api_key: ""
  api_key_env: "MODELARK_API_KEY"
  model: "Qwen3-Embedding-8B"
  dimension: 4096  # 必须与模型实际输出维度一致，切换模型后需重建索引
  timeout_seconds: 8
  batch_size: 16
  normalize: true

rerank:
  enabled: false
  provider: "modelark"
  base_url: ""
  api_key: ""
  api_key_env: "MODELARK_API_KEY"
  model: "Qwen3-Reranker-8B"
  timeout_seconds: 8
  candidate_top_k: 30
  final_top_k: 8
  max_documents_per_request: 20  # 每批请求最大候选文本数量

memory:
  enabled: true
  inject_enabled: true
  extraction_enabled: true
  max_recent_turns_for_query: 6
  vector_top_k: 30
  final_top_k: 6
  max_injected_chars: 1500
  scopes:
    include_global: true
    include_character: true
    include_conversation: true
  scoring:
    vector_weight: 0.55
    importance_weight: 0.20
    recency_weight: 0.10
    scope_weight: 0.10
    confidence_weight: 0.05
  extraction:
    min_importance: 0.45
    min_confidence: 0.55
    extract_after_each_turn: true
    fallback_rule_based: true
  judge:
    enabled: true
    provider: "openai_compatible"
    base_url: ""
    api_key: ""
    api_key_env: "MEMORY_JUDGE_API_KEY"
    model: ""
    timeout_seconds: 30
    temperature: 0.0
    mode: "model_only"  # model_only | model_with_user_rules
    user_rules: []
    prompt: ""
  hot_context:
    enabled: true
    inject_always: true
    max_chars: 1200
    include_sections:
      scene: true
      key_person: true
      main_quest: true
      side_quest: true
      promise: true
      open_loop: true
      relationship: true
      boundary: true
      preference: true
      location: true
      item: true
      world_state: true
      recent_summary: true
      mood: true
    section_order:
      - boundary
      - scene
      - location
      - key_person
      - relationship
      - main_quest
      - side_quest
      - promise
      - open_loop
      - item
      - world_state
      - recent_summary
      - mood
      - preference
    max_items_per_section:
      boundary: 5
      scene: 6
      location: 4
      key_person: 8
      relationship: 4
      main_quest: 5
      side_quest: 5
      promise: 6
      open_loop: 6
      item: 6
      world_state: 5
      recent_summary: 3
      mood: 3
      preference: 5
  state_updater:
    enabled: true
    mode: "model_template"  # model_template | rule_only
    update_after_each_turn: true
    update_every_n_turns: 1
    min_confidence: 0.55
    auto_expire_resolved_items: true
    max_state_items_per_conversation: 200
    provider: "openai_compatible"
    base_url: ""
    api_key: ""
    api_key_env: "STATE_FILLER_API_KEY"
    model: ""
    timeout_seconds: 30
    temperature: 0.0
    prompt: ""
  retrieval_gate:
    enabled: true
    mode: "auto"  # always | never | auto
    vector_search_on_new_session: true
    vector_search_every_n_turns: 6
    vector_search_when_state_confidence_below: 0.65
    trigger_keywords:
      - "记得"
      - "还记得"
      - "上次"
      - "以前"
      - "之前"
      - "曾经"
      - "约定"
      - "我们说过"
      - "你答应过"
      - "那个人"
      - "那个地方"
      - "那个东西"
      - "叫什么"
      - "发生过什么"
    skip_when_latest_user_text_chars_below: 4
    skip_when_state_is_sufficient: true

storage:
  root_dir: "./data"
  sqlite:
    app_db: "./data/app.sqlite"
    memory_db: "./data/memory/memory.sqlite"
    journal_mode: "WAL"
    busy_timeout_ms: 5000
  lancedb:
    path: "./data/vector_indexes/qwen3_embedding_4096/lancedb"
    table: "memories"
    vector_column: "vector"
    text_column: "content"
    metric: "cosine"
    create_fts_index: true

compatibility:
  expose_v1_models: true
  expose_root_chat_completions: true
  cors_enabled: true
