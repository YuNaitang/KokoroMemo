# KokoroMemo Server 模式（PostgreSQL + pgvector）
# 使用前需在 .env 中取消注释 KOKOROMEMO_DB_URL
# 单容器 file 模式（SQLite + LanceDB）请使用：
#   docker compose -f docker-compose.file.yml up -d
# 或直接 docker run（免 .env 配置）

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SERVER_PORT:-14514}:14514"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - KOKOROMEMO_DB_HOST=db
      - KOKOROMEMO_DB_USER=kokoro
      - KOKOROMEMO_DB_NAME=kokoromemo
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BASE_URL=${LLM_BASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: kokoromemo
      POSTGRES_USER: kokoro
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kokoro -d kokoromemo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
